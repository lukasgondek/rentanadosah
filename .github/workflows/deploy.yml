name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_SUPABASE_PROJECT_ID: "cihocfgnphqzjzliuzxk"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpaG9jZmducGhxemp6bGl1enhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjUxNTksImV4cCI6MjA4ODY0MTE1OX0.xqa22SAtq-94tYtQ_eUDQc3gbqlr2jlje2SStxE0Q1A"
          VITE_SUPABASE_URL: "https://cihocfgnphqzjzliuzxk.supabase.co"
        run: npm run build
      - name: Copy 404.html for SPA routing
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
